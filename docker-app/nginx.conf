# ============================================================================
# NGINX CONFIGURATION - ECS Demo Application
# ============================================================================
# This configuration serves the dynamically generated HTML page and provides
# a health check endpoint for the ALB target group
# ============================================================================

server {
    listen 80;
    server_name _;
    
    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Main application endpoint
    location / {
        try_files $uri $uri/ =404;
        
        # Add custom headers to show which task served the request
        add_header X-Served-By-Task $hostname;
        add_header X-ECS-Container "Fargate";
    }
    
    # Health check endpoint for ALB
    # ALB will periodically check this endpoint to determine if the task is healthy
    location /health {
        access_log off;  # Don't log health checks (reduces noise)
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Alternative health check endpoint (same as above)
    location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Nginx stub status for monitoring (optional, for debugging)
    location /nginx_status {
        stub_status on;
        access_log off;
        # Allow only from internal networks in production
        # allow 10.0.0.0/8;
        # deny all;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
