name: SonarQube Scan
description: "Composite action for SonarQube scan"

inputs:
  SONAR_TOKEN:
    description: "Token used for Authentication with sonarqube"
    required: true

  GITHUB_TOKEN:
    description: "Github token with 'pull-requests: write' permission"
    default: ""
  
  host_url:
    description: "SonarQube server url"
    default: "http://sonarqube.intra.your-org.com"
    required: false

  project_key:
    description: "SonarQube projectKey"
    required: true

  debug:
    description: "Verbose output of sonarqube-scan-action"
    default: "false"
  
  branch:
    description: "Branch for SonarQube propertise"
    required: true
  
  sources:
    description: "Sonar scaner sources"
    default: "."

  tests:
    description: "The initial analysis scope for test code in the project. Omit to skip"
    default: "" 
  
  quality_gate:
    description: "Check quality gate"
    default: "true"

  generic_coverage_report_paths:
    description: "Generic coverage report paths (comma-separated). Omit to skip."
    default: ""

  python_coverage_report_paths:
    description: "Python coverage report paths (comma-separated). Omit to skip."
