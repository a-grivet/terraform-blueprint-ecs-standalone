runs:
  using: composite
  steps:

    - name: Validate input project_key parameter
      shell: bash
      run: |
          echo "Checking project key: ${{ inputs.project_key  }}"
          if [[ ! "${{ inputs.project_key }}" =~ ^(com|org)\.(fca|inetpsa|opel|psa|your-org|stla)\.[A-Za-z]{3}[0-9]{2}D?[:.].* ]]; then
            echo "Invalid poroject_key format: ${{ inputs.project_key }}"
            exit 1
          fi
          echo "Parameter is valid: ${{ inputs.project_key }}"
    
    - name: Get scan args
      id: scan-args
      shell: bash
      run: |
        ARGS="-Dsonar.projectKey=${{ inputs.project_key }} \
              -Dsonar.verbose=${{ inputs.debug }} \
              -Dsonar.sources=${{ inputs.sources }} \
              -Dsonar.branch.name=${{ inputs.branch }}"
        if [[ -n "${{ inputs.generic_coverage_report_paths }}" ]]; then
          ARGS="$ARGS -Dsonar.coverageReportPaths=${{ inputs.generic_coverage_report_paths }}"
        fi
        if [[ -n "${{ inputs.python_coverage_report_paths }}" ]]; then
          ARGS="$ARGS -Dsonar.python.coverage.reportPaths=${{ inputs.python_coverage_report_paths }}"
        fi
        if [[ -n "${{ inputs.tests }}" ]]; then
          ARGS="$ARGS -Dsonar.tests=${{ inputs.tests }}"
        fi
        echo "args=$ARGS" >> "$GITHUB_OUTPUT"

    - name: Official SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ inputs.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ inputs.host_url }}
        SONAR_ROOT_CERT:  ${{ inputs.sonar_root_cert }}
      with:
        args: ${{ steps.scan-args.outputs.args }}

    - name: SonarQube Quality Gate check
      if: ${{ inputs.quality_gate == 'true' }}
      id: sonarqube-quality-gate
      uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
      env:
        SONAR_TOKEN: ${{ inputs.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ inputs.host_url }}
        SONAR_ROOT_CERT:  ${{ inputs.sonar_root_cert }}
      with:
        pollingTimeoutSec: 600
   
    - name: SonarQube summary
      if: ${{ inputs.quality_gate == 'true' }}
      shell: bash
      env:
        STATUS: ${{ steps.sonarqube-quality-gate.outputs.quality-gate-status }}
        HOST:   ${{ inputs.host_url }}
        PROJ:   ${{ inputs.project_key }}
        BRANCH: ${{ inputs.branch }}
      run: |
        # remove all ".intra" occurrences from HOST
        HOST="${HOST//.intra/}"

        DASHBOARD_URL="${HOST%/}/dashboard?id=${PROJ}&branch=${BRANCH}"
        {
          echo "## 🧪 SonarQube Quality Gate"
          echo ""
          echo "- **Project:** \`${PROJ}\`"
          echo "- **Branch:** \`${BRANCH}\`"
          echo "- **Status:** **${STATUS:-UNKNOWN}**"
          echo ""
          echo "[Open in SonarQube](${DASHBOARD_URL})"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Post results in PR
      if: |
        github.event_name == 'pull_request' &&
        inputs.quality_gate == 'true' && inputs.GITHUB_TOKEN != ''
      uses: actions/github-script@v7
      env:
        STATUS: ${{ steps.sonarqube-quality-gate.outputs.quality-gate-status }}
        HOST:   ${{ inputs.host_url }}
        PROJ:   ${{ inputs.project_key }}
        BRANCH: ${{ inputs.branch }}
      with:
        github-token: ${{ inputs.GITHUB_TOKEN }}
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          // Clean HOST if it contains `.intra`
          const rawHost = process.env.HOST || '';
          const host = rawHost.replace('.intra', '');

          const output = `### 🧪 SonarQube Quality Gate

          - **Project:** \`${process.env.PROJ}\`
          - **Branch:** \`${process.env.BRANCH}\`
          - **Status:** **${process.env.STATUS || 'UNKNOWN'}**

          [Open in SonarQube](${host}/dashboard?id=${process.env.PROJ}&branch=${process.env.BRANCH})`;

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('SonarQube Quality Gate')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: output
            });
          } else {
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
          }